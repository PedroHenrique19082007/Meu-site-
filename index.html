<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>URBAS STYLE - Moda Masculina</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f0f0f0, #ffffff);
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 20px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }
    h1 {
      font-size: 2.5rem;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .divider {
      width: 50px;
      height: 3px;
      background-color: #222;
      margin: 10px auto 15px auto;
    }
    p {
      font-size: 1rem;
      color: #555;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #222;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
    }
    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>URBAS STYLE</h1>
    <div class="divider"></div>
    <p>Moda Masculina</p>
    <button>Meu Primeiro Site</button>
  </div>
</body>
</html>
